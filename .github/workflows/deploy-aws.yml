name: Deploy AWS

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: trustloop
  TF_IN_AUTOMATION: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm run prisma:generate

      - name: Lint
        run: pnpm run lint

      - name: Build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          REDIS_URL: redis://localhost:6379
          STYTCH_PROJECT_ID: placeholder
          STYTCH_SECRET: placeholder
          STYTCH_ENV: test
          KEY_ENCRYPTION_SECRET: placeholder-key-encryption-secret-123456789
          RESEND_API_KEY: re_placeholder
          RESEND_FROM_EMAIL: TrustLoop <noreply@example.com>
          DODO_PAYMENTS_API_KEY: placeholder
          DODO_PAYMENTS_WEBHOOK_KEY: placeholder
          DODO_PAYMENTS_ENV: test_mode
          DODO_PRODUCT_ID_STARTER: placeholder
          DODO_PRODUCT_ID_PRO: placeholder
          DODO_PRODUCT_ID_ENTERPRISE: placeholder
          BILLING_AUTOMATION_CRON_SECRET: placeholder
          REMINDER_ENQUEUE_CRON_SECRET: placeholder
          AI_KEY_HEALTH_CRON_SECRET: placeholder
          REMINDER_STALE_MINUTES: "240"
          AWS_REGION: us-east-1
          REMINDER_QUEUE_NAME: trustloop-incident-reminders
          REMINDER_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/000000000000/trustloop-incident-reminders
        run: pnpm run build

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Apply (ECR bootstrap)
        working-directory: infra/terraform
        run: terraform apply -target=aws_ecr_repository.app -auto-approve -var="image_tag=bootstrap"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REPO="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}"
          docker build -t "$ECR_REPO:$GITHUB_SHA" .
          docker push "$ECR_REPO:$GITHUB_SHA"

      - name: Terraform Apply (Full deploy)
        working-directory: infra/terraform
        run: terraform apply -auto-approve -var="image_tag=${{ github.sha }}"

      - name: Run Prisma Migrations
        working-directory: infra/terraform
        run: |
          ECS_CLUSTER=$(terraform output -raw ecs_cluster_name)
          WEB_TASK_DEF=$(terraform output -raw web_task_definition_arn)
          ECS_SUBNETS=$(terraform output -raw ecs_subnet_ids_csv)
          ECS_SG=$(terraform output -raw ecs_security_group_id)

          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --launch-type FARGATE \
            --task-definition "$WEB_TASK_DEF" \
            --network-configuration "awsvpcConfiguration={subnets=[$ECS_SUBNETS],securityGroups=[$ECS_SG],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"trustloop-web","command":["pnpm","run","prisma:deploy"]}]}' \
            --query 'tasks[0].taskArn' --output text)

          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code $EXIT_CODE"
            exit 1
          fi

      - name: Post-deploy smoke test
        working-directory: infra/terraform
        run: |
          APP_URL=$(terraform output -raw app_url)
          echo "Deployed to $APP_URL"
          for ep in /api/health /login /register; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$APP_URL$ep" || echo "000")
            if [ "$STATUS" = "000" ]; then echo "FAIL $ep"; exit 1; fi
            echo "OK $ep — $STATUS"
          done
