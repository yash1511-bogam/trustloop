name: Deploy AWS

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: trustloop
  NODE_VERSION: "22"
  PNPM_VERSION: "10.30.3"

jobs:
  # ── Stage 1: Validate code quality and build ────────────────────────────────
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: pnpm run prisma:generate

      - name: Validate Prisma schema
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: pnpm run prisma:validate

      - name: Lint
        run: pnpm run lint

      - name: Build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          REDIS_URL: redis://localhost:6379
          STYTCH_PROJECT_ID: ci-placeholder
          STYTCH_SECRET: ci-placeholder
          STYTCH_ENV: test
          KEY_ENCRYPTION_SECRET: ci-placeholder-key-encryption-secret-32
          RESEND_API_KEY: re_ci_placeholder
          RESEND_FROM_EMAIL: CI <noreply@example.com>
          DODO_PAYMENTS_API_KEY: ci-placeholder
          DODO_PAYMENTS_WEBHOOK_KEY: ci-placeholder
          DODO_PAYMENTS_ENV: test_mode
          DODO_PRODUCT_ID_STARTER: ci
          DODO_PRODUCT_ID_PRO: ci
          DODO_PRODUCT_ID_ENTERPRISE: ci
          BILLING_AUTOMATION_CRON_SECRET: ci
          REMINDER_ENQUEUE_CRON_SECRET: ci
          AI_KEY_HEALTH_CRON_SECRET: ci
          REMINDER_STALE_MINUTES: "240"
          AWS_REGION: us-east-1
          REMINDER_QUEUE_NAME: ci-queue
          REMINDER_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/000000000000/ci-queue
        run: pnpm run build

  # ── Stage 2: Deploy to AWS (only after CI passes) ──────────────────────────
  deploy:
    name: Deploy
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_IN_AUTOMATION: true
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      # ── Terraform ───────────────────────────────────────────────────────────
      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/terraform
        run: |
          terraform plan \
            -var="image_tag=${{ github.sha }}" \
            -var="acm_certificate_arn=arn:aws:acm:us-east-1:448049831890:certificate/8d33e617-0870-42c9-912d-dd46490afdf3" \
            -var="public_app_url_override=https://trustloop.yashbogam.me" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan

      # ── Docker build & push ─────────────────────────────────────────────────
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REPO="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}"
          IMAGE="$ECR_REPO:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      # ── Force ECS to pick up new image ──────────────────────────────────────
      - name: Update ECS services
        working-directory: infra/terraform
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          aws ecs update-service --cluster "$CLUSTER" --service "${PROJECT_NAME}-web" --force-new-deployment --no-cli-pager
          aws ecs update-service --cluster "$CLUSTER" --service "${PROJECT_NAME}-worker" --force-new-deployment --no-cli-pager

      # ── Database migrations ─────────────────────────────────────────────────
      - name: Run Prisma migrations
        working-directory: infra/terraform
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          TASK_DEF=$(terraform output -raw web_task_definition_arn)
          SUBNETS=$(terraform output -raw ecs_subnet_ids_csv)
          SG=$(terraform output -raw ecs_security_group_id)

          echo "Starting migration task..."
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --launch-type FARGATE \
            --task-definition "$TASK_DEF" \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"trustloop-web","command":["pnpm","run","prisma:deploy"]}]}' \
            --query 'tasks[0].taskArn' --output text)

          echo "Waiting for migration task to complete: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migration failed (exit code $EXIT_CODE)"
            aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
              --query 'tasks[0].containers[0].reason' --output text
            exit 1
          fi
          echo "Migrations applied successfully"

      # ── Verify deployment ───────────────────────────────────────────────────
      - name: Wait for ECS services to stabilize
        working-directory: infra/terraform
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          echo "Waiting for web service to stabilize..."
          aws ecs wait services-stable --cluster "$CLUSTER" --services "${PROJECT_NAME}-web"
          echo "Web service is stable"

      - name: Smoke test
        working-directory: infra/terraform
        run: |
          APP_URL=$(terraform output -raw app_url)
          echo "Testing $APP_URL"
          FAILED=0
          for ep in /api/health /login /register; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$APP_URL$ep" || echo "000")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "✅ $ep → $STATUS"
            else
              echo "❌ $ep → $STATUS"
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then exit 1; fi
          echo ""
          echo "🚀 Deployed successfully to $APP_URL"
