name: Pipeline

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: trustloop
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.0"

jobs:
  # ── Stage 1: Web Build (lint + build) ───────────────────────────────────────
  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: pnpm run prisma:generate

      - name: Validate Prisma schema
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: pnpm run prisma:validate

      - name: Lint
        run: pnpm run lint

      - name: Build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          REDIS_URL: redis://localhost:6379
          STYTCH_PROJECT_ID: ci-placeholder
          STYTCH_SECRET: ci-placeholder
          STYTCH_ENV: test
          KEY_ENCRYPTION_SECRET: ci-placeholder-key-encryption-secret-32
          RESEND_API_KEY: re_ci_placeholder
          RESEND_FROM_EMAIL: CI <noreply@example.com>
          DODO_PAYMENTS_API_KEY: ci-placeholder
          DODO_PAYMENTS_WEBHOOK_KEY: ci-placeholder
          DODO_PAYMENTS_ENV: test_mode
          DODO_PRODUCT_ID_STARTER: ci
          DODO_PRODUCT_ID_PRO: ci
          DODO_PRODUCT_ID_ENTERPRISE: ci
          BILLING_AUTOMATION_CRON_SECRET: ci
          REMINDER_ENQUEUE_CRON_SECRET: ci
          AI_KEY_HEALTH_CRON_SECRET: ci
          REMINDER_STALE_MINUTES: "240"
          AWS_REGION: us-east-1
          REMINDER_QUEUE_NAME: ci-queue
          REMINDER_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/000000000000/ci-queue
        run: pnpm run build

  # ── Stage 2: Build Desktop & Release ────────────────────────────────────────
  build-desktop:
    name: Build Desktop & Release
    needs: web-build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: pnpm run prisma:generate

      - name: Install desktop dependencies
        working-directory: trustloop-desktop
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client for desktop
        working-directory: trustloop-desktop
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: pnpm prisma:generate

      - name: TypeScript compile check
        working-directory: trustloop-desktop
        run: pnpm compile

      - name: Validate renderer JS
        working-directory: trustloop-desktop
        run: node --check src/renderer/app.js

      - name: Build desktop app
        working-directory: trustloop-desktop
        env:
          NODE_ENV: production
        run: pnpm build

      - name: Get version
        id: version
        working-directory: trustloop-desktop
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: desktop-v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: TrustLoop Desktop v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})
          draft: false
          prerelease: ${{ github.ref != 'refs/heads/main' }}
          files: |
            trustloop-desktop/dist/*.dmg
            trustloop-desktop/dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  # ── Stage 3: Deploy Staging ─────────────────────────────────────────────────
  deploy-staging:
    name: Deploy Staging
    needs: build-desktop
    runs-on: ubuntu-latest
    environment: staging
    env:
      TF_IN_AUTOMATION: true
      TF_WORKSPACE: staging
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/terraform
        run: |
          terraform plan \
            -var="image_tag=${{ github.sha }}" \
            -var="project_name=trustloop-staging" \
            -var="public_app_url_override=${{ vars.STAGING_APP_URL }}" \
            -var="acm_certificate_arn=${{ secrets.STAGING_ACM_CERT_ARN }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REPO="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/trustloop-staging"
          IMAGE="$ECR_REPO:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Run Prisma migrations
        working-directory: infra/terraform
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          TASK_DEF=$(terraform output -raw web_task_definition_arn)
          SUBNETS=$(terraform output -raw ecs_subnet_ids_csv)
          SG=$(terraform output -raw ecs_security_group_id)
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" --launch-type FARGATE --task-definition "$TASK_DEF" \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"trustloop-web","command":["sh","-c","cd /prisma-cli && node node_modules/prisma/build/index.js migrate deploy"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$EXIT_CODE" != "0" ]; then echo "::error::Migration failed"; exit 1; fi

      - name: Update ECS services
        working-directory: infra/terraform
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          aws ecs update-service --cluster "$CLUSTER" --service "trustloop-staging-web" --force-new-deployment --no-cli-pager
          aws ecs update-service --cluster "$CLUSTER" --service "trustloop-staging-worker" --force-new-deployment --no-cli-pager

      - name: Smoke test staging
        working-directory: infra/terraform
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          echo "Waiting for staging services to stabilize..."
          aws ecs wait services-stable --cluster "$CLUSTER" --services "trustloop-staging-web" "trustloop-staging-worker"
          echo "All staging services stable"
          APP_URL=$(terraform output -raw app_url)
          for ep in /api/health /login; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$APP_URL$ep" || echo "000")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then echo "✅ $ep → $STATUS"
            else echo "❌ $ep → $STATUS"; exit 1; fi
          done

  # ── Stage 4: Deploy Production ──────────────────────────────────────────────
  deploy-production:
    name: Deploy Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_IN_AUTOMATION: true
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/terraform
        run: |
          terraform plan \
            -var="image_tag=${{ github.sha }}" \
            -var="acm_certificate_arn=${{ secrets.PROD_ACM_CERT_ARN }}" \
            -var="public_app_url_override=${{ vars.PROD_APP_URL }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REPO="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}"
          IMAGE="$ECR_REPO:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Run Prisma migrations
        working-directory: infra/terraform
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          TASK_DEF=$(terraform output -raw web_task_definition_arn)
          SUBNETS=$(terraform output -raw ecs_subnet_ids_csv)
          SG=$(terraform output -raw ecs_security_group_id)
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" --launch-type FARGATE --task-definition "$TASK_DEF" \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"trustloop-web","command":["sh","-c","cd /prisma-cli && node node_modules/prisma/build/index.js migrate deploy"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migration failed (exit code $EXIT_CODE)"
            exit 1
          fi

      - name: Update ECS services
        working-directory: infra/terraform
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          aws ecs update-service --cluster "$CLUSTER" --service "${PROJECT_NAME}-web" --force-new-deployment --no-cli-pager
          aws ecs update-service --cluster "$CLUSTER" --service "${PROJECT_NAME}-worker" --force-new-deployment --no-cli-pager

      - name: Wait for services to stabilize
        working-directory: infra/terraform
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          aws ecs wait services-stable --cluster "$CLUSTER" --services "${PROJECT_NAME}-web" "${PROJECT_NAME}-worker"

      - name: Smoke test production
        working-directory: infra/terraform
        run: |
          APP_URL=$(terraform output -raw app_url)
          FAILED=0
          for ep in /api/health /login /register; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$APP_URL$ep" || echo "000")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then echo "✅ $ep → $STATUS"
            else echo "❌ $ep → $STATUS"; FAILED=1; fi
          done
          if [ "$FAILED" = "1" ]; then exit 1; fi
          echo "🚀 Deployed successfully to $APP_URL"
