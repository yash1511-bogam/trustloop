name: Test

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start local dependencies
        run: docker compose -f docker-compose.localstack.yml up -d

      - name: Wait for local dependencies
        run: |
          pg_ready=false
          for i in {1..60}; do
            if docker compose -f docker-compose.localstack.yml exec -T postgres pg_isready -U postgres -d trustloop >/dev/null 2>&1; then
              pg_ready=true
              break
            fi
            sleep 2
          done
          if [ "$pg_ready" != "true" ]; then
            echo "Postgres did not become ready in time."
            exit 1
          fi

          redis_ready=false
          for i in {1..60}; do
            if docker compose -f docker-compose.localstack.yml exec -T redis redis-cli ping 2>/dev/null | grep -q PONG; then
              redis_ready=true
              break
            fi
            sleep 2
          done
          if [ "$redis_ready" != "true" ]; then
            echo "Redis did not become ready in time."
            exit 1
          fi

      - name: Prepare application services
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trustloop?schema=public
          REDIS_URL: redis://localhost:6379
          STYTCH_PROJECT_ID: project-test-placeholder
          STYTCH_SECRET: secret-test-placeholder
          STYTCH_ENV: test
          KEY_ENCRYPTION_SECRET: placeholder-key-encryption-secret-123456789
          RESEND_API_KEY: re_placeholder
          RESEND_FROM_EMAIL: TrustLoop <onboarding@resend.dev>
          DODO_PAYMENTS_API_KEY: dodo_test_placeholder
          DODO_PAYMENTS_WEBHOOK_KEY: dodo_whsec_placeholder
          DODO_PAYMENTS_ENV: test_mode
          DODO_PRODUCT_ID_STARTER: prod_test_starter
          DODO_PRODUCT_ID_PRO: prod_test_pro
          DODO_PRODUCT_ID_ENTERPRISE: prod_test_enterprise
          BILLING_AUTOMATION_CRON_SECRET: billing-cron-test-secret
          REMINDER_ENQUEUE_CRON_SECRET: reminder-enqueue-test-secret
          AI_KEY_HEALTH_CRON_SECRET: ai-key-health-test-secret
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ACCOUNT_ID: 000000000000
          REMINDER_QUEUE_NAME: trustloop-incident-reminders
          REMINDER_QUEUE_URL: http://localhost:4566/000000000000/trustloop-incident-reminders
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
        run: |
          pnpm run prisma:validate
          pnpm run prisma:generate
          pnpm run prisma:deploy
          pnpm run db:seed
          pnpm run localstack:init

      - name: Lint
        run: pnpm run lint

      - name: Tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trustloop?schema=public
          REDIS_URL: redis://localhost:6379
          STYTCH_PROJECT_ID: project-test-placeholder
          STYTCH_SECRET: secret-test-placeholder
          STYTCH_ENV: test
          KEY_ENCRYPTION_SECRET: placeholder-key-encryption-secret-123456789
          VITEST_STRICT_COVERAGE: "1"
        run: pnpm run test:coverage

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: End-to-end
        env:
          CI: "true"
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trustloop?schema=public
          REDIS_URL: redis://localhost:6379
          STYTCH_PROJECT_ID: project-test-placeholder
          STYTCH_SECRET: secret-test-placeholder
          STYTCH_ENV: test
          KEY_ENCRYPTION_SECRET: placeholder-key-encryption-secret-123456789
          RESEND_API_KEY: re_placeholder
          RESEND_FROM_EMAIL: TrustLoop <onboarding@resend.dev>
          DODO_PAYMENTS_API_KEY: dodo_test_placeholder
          DODO_PAYMENTS_WEBHOOK_KEY: dodo_whsec_placeholder
          DODO_PAYMENTS_ENV: test_mode
          DODO_PRODUCT_ID_STARTER: prod_test_starter
          DODO_PRODUCT_ID_PRO: prod_test_pro
          DODO_PRODUCT_ID_ENTERPRISE: prod_test_enterprise
          BILLING_AUTOMATION_CRON_SECRET: billing-cron-test-secret
          REMINDER_ENQUEUE_CRON_SECRET: reminder-enqueue-test-secret
          AI_KEY_HEALTH_CRON_SECRET: ai-key-health-test-secret
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ACCOUNT_ID: 000000000000
          REMINDER_QUEUE_NAME: trustloop-incident-reminders
          REMINDER_QUEUE_URL: http://localhost:4566/000000000000/trustloop-incident-reminders
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
          TRUSTLOOP_STUB_AUTH: "1"
          TRUSTLOOP_STUB_OTP_CODE: "000000"
          TRUSTLOOP_STUB_EMAIL_DELIVERY: "1"
        run: pnpm run test:e2e
